<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alfarizzi Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#ffffff;
color:#111;
transition:0.3s;
}

.dark{
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
position:sticky;
top:0;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
}

.dark header{
background:rgba(15,23,42,0.7);
}

nav a{
margin-left:20px;
text-decoration:none;
color:inherit;
font-weight:500;
}

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
opacity:0.7;
margin-bottom:20px;
}

.btn{
padding:12px 24px;
border-radius:8px;
background:#6366f1;
color:white;
text-decoration:none;
}

.projects{
padding:80px 10%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
padding:25px;
border-radius:12px;
background:#f3f4f6;
transition:0.3s;
}

.dark .card{
background:#1e293b;
}

.card:hover{
transform:translateY(-6px);
}

footer{
text-align:center;
padding:40px;
opacity:0.6;
}

/* mobile */

@media(max-width:700px){

.hero h1{
font-size:32px;
}

}

</style>
</head>

<body>

<header>

<h3>Alfarizzi</h3>

<nav>
<a href="#">Home</a>
<a href="#projects">Projects</a>
<button onclick="toggleDark()">🌙</button>
</nav>

</header>

<section class="hero">

<h1>Hi, I'm Alfarizzi</h1>

<p>Web Developer • AI Tools • Creative Projects</p>

<a class="btn" href="#projects">See My Work</a>

</section>

<section id="projects" class="projects">

<div class="card">
<h3>AI Tool</h3>
<p>Simple AI web tool project.</p>
</div>

<div class="card">
<h3>Landing Page</h3>
<p>Modern responsive landing page.</p>
</div>

<div class="card">
<h3>GitHub Project</h3>
<p>Open source project on GitHub.</p>
</div>

</section>

<footer>
© 2026 Alfarizzi
</footer>

<script>

function toggleDark(){
document.body.classList.toggle("dark")
}

</script>

</body>
</html>
